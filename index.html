<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Atividades</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#f4f7fb;font-family:Arial,Helvetica,sans-serif}.app{max-width:1250px;margin:auto;padding:20px}.cardx{background:#fff;border-radius:18px;padding:18px;box-shadow:0 6px 20px #0001}.btn-main{background:#2563eb;color:#fff;border:0;border-radius:12px;font-weight:700}.btn-main:hover{background:#1d4ed8;color:#fff}.hidden{display:none!important}.table thead th{background:#0f172a;color:#fff}.badgex{border-radius:999px;padding:6px 10px;font-weight:700}.urgente{background:#fee2e2;color:#991b1b}.aguardar{background:#fef3c7;color:#92400e}.normal{background:#dcfce7;color:#166534}.aberto{background:#dbeafe;color:#1e40af}.andamento{background:#fef3c7;color:#92400e}.concluido{background:#dcfce7;color:#166534}.icon-btn{border:1px solid #ddd;border-radius:10px;background:white;padding:6px 9px;margin:1px}
</style>
</head>
<body>

<div id="loginBox" class="app" style="max-width:430px;margin-top:70px">
  <div class="cardx">
    <h3 class="fw-bold mb-3">Gestão de Atividades</h3>
    <label>Usuário</label>
    <input id="loginUsuario" class="form-control mb-2">
    <label>Senha</label>
    <input id="loginSenha" type="password" class="form-control mb-3">
    <button class="btn btn-main w-100" onclick="entrar()">Entrar</button>
    <div id="erroLogin" class="text-danger mt-3"></div>
  </div>
</div>

<div id="appBox" class="app hidden">
  <div class="cardx mb-3 d-flex flex-wrap justify-content-between align-items-center gap-2">
    <div>
      <h3 class="fw-bold m-0">Gestão de Atividades</h3>
      <small id="usuarioLogado"></small>
    </div>
    <div class="d-flex gap-2 flex-wrap">
      <button class="btn btn-outline-primary" onclick="carregarTudo()">Atualizar</button>
      <button class="btn btn-main" onclick="novaAtividade()">Nova Atividade</button>
      <button class="btn btn-outline-danger" onclick="sair()">Sair</button>
    </div>
  </div>

  <div class="cardx mb-3">
    <ul class="nav nav-pills gap-2">
      <li><button class="nav-link active" onclick="tela('ativas',this)">Atividades Ativas</button></li>
      <li><button class="nav-link" onclick="tela('concluidas',this)">Concluídas</button></li>
      <li id="menuUsuarios" class="hidden"><button class="nav-link" onclick="tela('usuarios',this)">Usuários</button></li>
    </ul>
  </div>

  <section id="telaAtivas" class="cardx">
    <h4 class="fw-bold">Histórico de Ações</h4>
    <div class="table-responsive">
      <table class="table table-hover">
        <thead><tr><th>Nº</th><th>Data</th><th>Descrição</th><th>Responsável</th><th>Status</th><th>Prioridade</th><th>Observação</th><th>Ações</th></tr></thead>
        <tbody id="tbodyAtivas"></tbody>
      </table>
    </div>
  </section>

  <section id="telaConcluidas" class="cardx hidden">
    <h4 class="fw-bold">Atividades Concluídas</h4>
    <div class="table-responsive">
      <table class="table table-hover">
        <thead><tr><th>Nº</th><th>Data</th><th>Descrição</th><th>Responsável</th><th>Status</th><th>Prioridade</th><th>Observação</th><th>Ações</th></tr></thead>
        <tbody id="tbodyConcluidas"></tbody>
      </table>
    </div>
  </section>

  <section id="telaUsuarios" class="cardx hidden">
    <h4 class="fw-bold">Usuários</h4>
    <div class="row g-2 mb-3">
      <div class="col-md-3"><input id="novoUsuario" class="form-control" placeholder="Usuário/apelido"></div>
      <div class="col-md-3"><input id="novoNome" class="form-control" placeholder="Nome / Responsável"></div>
      <div class="col-md-3"><input id="novaSenha" class="form-control" placeholder="Senha"></div>
      <div class="col-md-2">
        <select id="novoPerfil" class="form-select">
          <option value="usuario">Usuário</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="col-md-1"><button class="btn btn-main w-100" onclick="criarUsuario()">+</button></div>
    </div>
    <table class="table">
      <thead><tr><th>Usuário</th><th>Nome</th><th>Perfil</th><th>Ações</th></tr></thead>
      <tbody id="tbodyUsuarios"></tbody>
    </table>
  </section>
</div>

<div class="modal fade" id="modalAtividade">
<div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content">
<div class="modal-header"><h5 id="tituloModal">Nova Atividade</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body">
<input type="hidden" id="atividadeId">
<div class="row g-3">
<div class="col-md-3"><label>Nº</label><input id="numero" class="form-control" readonly></div>
<div class="col-md-3"><label>Data</label><input id="data" class="form-control" readonly></div>
<div class="col-md-6"><label>Responsável</label><select id="responsavel" class="form-select"></select></div>
<div class="col-12"><label>Descrição</label><textarea id="descricao" class="form-control"></textarea></div>
<div class="col-md-4"><label>Status</label><select id="status" class="form-select"><option>Aberto</option><option>Andamento</option><option>Concluído</option></select></div>
<div class="col-md-4"><label>Prioridade</label><select id="prioridade" class="form-select"><option>Normal</option><option>Urgente</option><option>Aguardar</option></select></div>
<div class="col-md-4"><label>Observação</label><input id="observacao" class="form-control"></div>
</div>
</div>
<div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-main" onclick="salvarAtividade()">Salvar</button></div>
</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const SUPABASE_URL="https://mcqnmoixquzyaqmeycjv.supabase.co";
const SUPABASE_KEY="sb_publishable_pgWjZRdLzoxeXnQgkYTsdw_YJjyKMHc";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let usuarioAtual=null, atividades=[], responsaveis=[], usuarios=[];
let modalAtividade;

document.addEventListener("DOMContentLoaded",()=>{
 modalAtividade=new bootstrap.Modal(document.getElementById("modalAtividade"));
});

function esc(s){return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function fmt(n){return String(n||1).padStart(4,"0")}
function hoje(){let d=new Date();return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+String(d.getFullYear()).slice(-2)}
function clsP(p){return p==="Urgente"?"urgente":p==="Aguardar"?"aguardar":"normal"}
function clsS(s){return s==="Concluído"?"concluido":s==="Andamento"?"andamento":"aberto"}

async function entrar(){
 let u=document.getElementById("loginUsuario").value.trim();
 let s=document.getElementById("loginSenha").value;
 document.getElementById("erroLogin").innerText="";
 let {data,error}=await sb.rpc("app_login",{p_usuario:u,p_senha:s});
 if(error){document.getElementById("erroLogin").innerText=error.message;return}
 let r=Array.isArray(data)?data[0]:data;
 if(!r||!r.ok){document.getElementById("erroLogin").innerText=r?.mensagem||"Login inválido";return}
 usuarioAtual=r;
 document.getElementById("loginBox").classList.add("hidden");
 document.getElementById("appBox").classList.remove("hidden");
 document.getElementById("usuarioLogado").innerText=`Usuário: ${r.nome||r.usuario} | Perfil: ${r.perfil}`;
 if(r.perfil==="admin")document.getElementById("menuUsuarios").classList.remove("hidden");
 await carregarTudo();
}

function sair(){location.reload()}

async function carregarTudo(){
 let a=await sb.rpc("app_listar_atividades");
 let r=await sb.rpc("app_listar_responsaveis");
 if(a.error){alert(a.error.message);return}
 if(r.error){alert(r.error.message);return}
 atividades=a.data||[];
 responsaveis=r.data||[];
 if(usuarioAtual?.perfil==="admin"){
   let u=await sb.rpc("app_listar_usuarios");
   usuarios=u.data||[];
   renderUsuarios();
 }
 renderResp();
 renderAtividades();
}

function renderResp(){
 document.getElementById("responsavel").innerHTML='<option value="">Selecione</option>'+responsaveis.map(r=>`<option>${esc(r.nome)}</option>`).join("");
}

function renderAtividades(){
 let at=atividades.filter(a=>a.status!=="Concluído");
 let co=atividades.filter(a=>a.status==="Concluído");
 document.getElementById("tbodyAtivas").innerHTML=at.length?at.map(linha).join(""):`<tr><td colspan="8" class="text-center">Nenhuma atividade ativa.</td></tr>`;
 document.getElementById("tbodyConcluidas").innerHTML=co.length?co.map(linha).join(""):`<tr><td colspan="8" class="text-center">Nenhuma concluída.</td></tr>`;
}

function linha(a){
 return `<tr>
 <td><b>${esc(a.numero)}</b></td><td>${esc(a.data_atividade)}</td><td>${esc(a.descricao)}</td>
 <td>${esc(a.responsavel)}</td><td><span class="badgex ${clsS(a.status)}">${esc(a.status)}</span></td>
 <td><span class="badgex ${clsP(a.prioridade)}">${esc(a.prioridade)}</span></td><td>${esc(a.observacao)}</td>
 <td>
 <button class="icon-btn" onclick="editar(${a.id})"><i class="bi bi-pencil-fill"></i></button>
 ${a.status === 'Concluído' ? `<button class="icon-btn" title="Voltar" onclick="statusAtiv(${a.id},'Andamento')"><i class="bi bi-arrow-counterclockwise"></i></button>` : `<button class="icon-btn" onclick="statusAtiv(${a.id},'Concluído')"><i class="bi bi-check-lg"></i></button>`}
 <button class="icon-btn" onclick="excluir(${a.id})"><i class="bi bi-trash-fill"></i></button>
 </td></tr>`
}

function novaAtividade(){
 document.getElementById("atividadeId").value="";
 document.getElementById("numero").value=fmt(atividades.length?Math.max(...atividades.map(a=>Number(a.numero)||0))+1:1);
 document.getElementById("data").value=hoje();
 document.getElementById("descricao").value="";
 document.getElementById("responsavel").value="";
 document.getElementById("status").value="Aberto";
 document.getElementById("prioridade").value="Normal";
 document.getElementById("observacao").value="";
 modalAtividade.show();
}

function editar(id){
 let a=atividades.find(x=>x.id===id); if(!a)return;
 document.getElementById("atividadeId").value=a.id;
 document.getElementById("numero").value=a.numero;
 document.getElementById("data").value=a.data_atividade;
 document.getElementById("descricao").value=a.descricao||"";
 document.getElementById("responsavel").value=a.responsavel||"";
 document.getElementById("status").value=a.status||"Aberto";
 document.getElementById("prioridade").value=a.prioridade||"Normal";
 document.getElementById("observacao").value=a.observacao||"";
 modalAtividade.show();
}

async function salvarAtividade(){
 let id=document.getElementById("atividadeId").value;
 let p={
 p_id:id?Number(id):null,
 p_numero:document.getElementById("numero").value,
 p_data:document.getElementById("data").value,
 p_descricao:document.getElementById("descricao").value.trim(),
 p_responsavel:document.getElementById("responsavel").value,
 p_status:document.getElementById("status").value,
 p_prioridade:document.getElementById("prioridade").value,
 p_observacao:document.getElementById("observacao").value.trim()
 };
 if(!p.p_descricao){alert("Informe a descrição.");return}
 if(!p.p_responsavel){alert("Selecione o responsável.");return}
 let {error}=await sb.rpc("app_salvar_atividade",p);
 if(error){alert(error.message);return}
 modalAtividade.hide();carregarTudo();
}

async function statusAtiv(id,s){await sb.rpc("app_alterar_status",{p_id:id,p_status:s});carregarTudo()}
async function excluir(id){if(confirm("Tem certeza que deseja excluir?")){await sb.rpc("app_excluir_atividade",{p_id:id});carregarTudo()}}

function tela(t,b){
 document.getElementById("telaAtivas").classList.toggle("hidden",t!=="ativas");
 document.getElementById("telaConcluidas").classList.toggle("hidden",t!=="concluidas");
 document.getElementById("telaUsuarios").classList.toggle("hidden",t!=="usuarios");
 document.querySelectorAll(".nav-link").forEach(x=>x.classList.remove("active")); b.classList.add("active");
}

function renderUsuarios(){
 document.getElementById("tbodyUsuarios").innerHTML=usuarios.map(u=>`<tr><td>${esc(u.usuario)}</td><td>${esc(u.nome)}</td><td>${esc(u.perfil)}</td><td><button class="btn btn-sm btn-danger" onclick="excluirUsuario(${u.id})">Excluir</button></td></tr>`).join("");
}

async function criarUsuario(){
 let p={
 p_usuario:document.getElementById("novoUsuario").value.trim(),
 p_senha:document.getElementById("novaSenha").value.trim(),
 p_nome:document.getElementById("novoNome").value.trim(),
 p_perfil:document.getElementById("novoPerfil").value
 };
 if(!p.p_usuario||!p.p_senha||!p.p_nome){alert("Preencha usuário, nome e senha.");return}
 let {error}=await sb.rpc("app_criar_usuario",p);
 if(error){alert(error.message);return}
 document.getElementById("novoUsuario").value="";
 document.getElementById("novoNome").value="";
 document.getElementById("novaSenha").value="";
 carregarTudo();
}

async function excluirUsuario(id){if(confirm("Excluir usuário?")){await sb.rpc("app_excluir_usuario",{p_id:id});carregarTudo()}}
</script>
</body>
</html>
